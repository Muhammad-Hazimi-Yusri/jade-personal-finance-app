version: '3.8'

services:
  # === PRODUCTION (behind Cloudflare Access) ===
  jade-app:
    build: .
    container_name: jade-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/jade.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # === PUBLIC DEMO (no auth, resets daily) ===
  jade-demo:
    build: .
    container_name: jade-demo
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./demo-data:/app/data
      - ./frontend:/app/frontend
    environment:
      - FLASK_ENV=production
      - DATABASE_PATH=/app/data/jade.db
      - DEMO_MODE=true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Restores demo-data/jade.db from demo-data/seed.db once on startup and
  # then every day at 03:00 UTC. Removes any leftover WAL/SHM sidecars so
  # the running Flask process reopens a clean snapshot.
  jade-demo-reset:
    image: alpine:3
    container_name: jade-demo-reset
    restart: unless-stopped
    volumes:
      - ./demo-data:/data
    entrypoint: /bin/sh
    command: >
      -c "
      set -eu;
      if [ ! -f /data/seed.db ]; then
        echo 'ERROR: /data/seed.db missing — run `python demo-data/build_seed_db.py` on the host first.';
        exit 1;
      fi;
      reset_db() {
        cp /data/seed.db /data/jade.db;
        rm -f /data/jade.db-wal /data/jade.db-shm;
        echo \"[$$(date -u +%FT%TZ)] Demo database reset\";
      };
      reset_db;
      while true; do
        now=$$(date -u +%s);
        midnight=$$(( now - now % 86400 ));
        target=$$(( midnight + 3 * 3600 ));
        if [ $$now -ge $$target ]; then
          target=$$(( target + 86400 ));
        fi;
        sleep $$(( target - now ));
        reset_db;
      done
      "
    depends_on:
      - jade-demo

  # === BACKUP ===
  litestream:
    image: litestream/litestream:latest
    container_name: jade-litestream
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./litestream.yml:/etc/litestream.yml
    environment:
      - LITESTREAM_ACCESS_KEY_ID=${S3_ACCESS_KEY}
      - LITESTREAM_SECRET_ACCESS_KEY=${S3_SECRET_KEY}
    command: replicate
    depends_on:
      - jade-app
