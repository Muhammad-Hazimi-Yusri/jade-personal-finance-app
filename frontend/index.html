<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jade</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Charts (used in Phase 3+) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4" defer></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js" defer></script>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="demo-banner" class="demo-banner" hidden>
  Demo Mode — data resets daily. All changes are discarded.
</div>

<!-- Mobile: hamburger (shown < 900px via CSS), toggles .sidebar--open -->
<button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
  <span aria-hidden="true">☰</span>
</button>

<!-- Mobile: tap-outside overlay that closes the sidebar drawer -->
<div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

<div class="app-layout">

  <!-- Sidebar navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">💎 Jade</span>
    </div>

    <ul class="nav-list">
      <li class="nav-section-label">Finance</li>
      <li><a class="nav-link" href="#/" data-route="">Dashboard</a></li>
      <li><a class="nav-link" href="#/transactions" data-route="transactions">Transactions</a></li>
      <li><a class="nav-link" href="#/upload" data-route="upload">Upload CSV</a></li>
      <li><a class="nav-link" href="#/budgets" data-route="budgets">Budgets</a></li>
      <li><a class="nav-link" href="#/reports" data-route="reports">Reports</a></li>

      <li class="nav-section-label">Trading</li>
      <li><a class="nav-link" href="#/trades" data-route="trades">Trade Log</a></li>
      <li><a class="nav-link" href="#/trades/new" data-route="trades/new">New Trade</a></li>
      <li><a class="nav-link" href="#/analytics" data-route="analytics">Analytics</a></li>
      <li><a class="nav-link" href="#/journal" data-route="journal">Journal</a></li>

      <li class="nav-divider"></li>
      <li><a class="nav-link" href="#/settings" data-route="settings">Settings</a></li>
    </ul>
  </nav>

  <!-- Main content area — views render here -->
  <main class="main-content" id="app">
    <div class="loading">Loading…</div>
  </main>

</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
